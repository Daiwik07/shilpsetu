<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shilpsetu · People</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="gallery.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body>
<nav id="navbar" class="navbar"></nav>
<div id="curs"><div id="cr"></div><div id="cd"></div></div>

<div id="bar">
  <div class="bar-brand">Shilpsetu</div>
  <div class="bar-hint">scroll to explore</div>
</div>

<div id="stage"></div>

<button class="nav-btn" id="nb-prev"><div class="nav-line"></div></button>
<button class="nav-btn" id="nb-next"><div class="nav-line"></div></button>

<div id="dots"></div>
<div id="prog"><div id="prog-fill"></div></div>
<script src="script.js"></script>
<script>
const DATA = [
  { first:"Bamboo",  last:"Basket",  role:"North East", img:"gllaery img/Bamboo Basket.jpg",},
  { first:"Bidri",  last:"Ware",  role:"karnataka", img:"gllaery img/Bidri ware.jpeg",},
  { first:"Blue",  last:"Pottery",  role:"Rajasthan", img:"gllaery img/Blue Pottery.jpeg",},
  { first:"Chikankari",  last:"Embroidery",  role:"Uttar Pradesh", img:"gllaery img/Chikankari Embroidery.jpeg",},
  { first:"Dhokra",  last:"Craft",  role:"Chhattisgarh", img:"gllaery img/Dhokra.png",},
  { first:"Gond",  last:"Painting",  role:"Madhya Pradesh", img:"gllaery img/Gond Painting.png",},
  { first:"Kathakali",  last:"Mask",  role:"Kerala", img:"gllaery img/Kathakali Mask.png",},
  { first:"Pashmina",  last:"Shawl",  role:"Kashmir", img:"gllaery img/Pashmina Shawl.jpeg",},
  { first:"Pulkari",  last:"Shawl",  role:"Punjab", img:"gllaery img/Phulkari.png",},
  { first:"Thangka",  last:"Painting",  role:"Ladakh", img:"gllaery img/Thangka Painting.png",},
];

const N = DATA.length;
let cur  = 0;
let busy = false;

const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dots');

const slides = DATA.map((d, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i === 0 ? ' visible' : '');
  el.innerHTML = `
    <div class="s-bg" style="background-image:url('${d.img}');"></div>
    <div class="s-ov"></div>
    <div class="s-content">
      <div class="s-left">
        <div class="s-num">${pad(i+1)} <span style="opacity:.35">/ ${pad(N)}</span></div>
        <div class="s-role">${d.role}</div>
        <div class="s-name">${d.first}<br><em>${d.last}</em></div>
      </div>
      <div class="s-right">
        <div class="s-big">${pad(i+1)}</div>
        <div class="s-line"></div>
      </div>
    </div>`;
  stage.appendChild(el);

  if (i > 0) { const img = new Image(); img.src = d.img; }

  const b = document.createElement('button');
  b.className = 'dot';
  b.addEventListener('click', () => go(i));
  dotsEl.appendChild(b);

  return el;
});

syncUI();

function go(nxt) {
  if (busy) return;
  nxt = ((nxt % N) + N) % N;
  if (nxt === cur) return;
  busy = true;

  const fromEl = slides[cur];
  const toEl   = slides[nxt];

  toEl.classList.remove('visible');
  toEl.classList.add('entering');

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fromEl.classList.remove('visible');
    });
  });

  cur = nxt;
  syncUI();

  setTimeout(() => {
    fromEl.classList.remove('entering','visible');
    toEl.classList.remove('entering');
    toEl.classList.add('visible');
    busy = false;
  }, 750);
}

function pad(n) { return String(n).padStart(2,'0'); }

function syncUI() {
  dotsEl.querySelectorAll('.dot').forEach((d,i) => {
    d.style.height     = i === cur ? '20px' : '5px';
    d.style.background = i === cur ? '#d4a574' : 'rgba(212,165,116,.18)';
  });
  const pct = N > 1 ? (cur / (N-1)) * 100 : 100;
  document.getElementById('prog-fill').style.width = pct + '%';
}

let wAcc = 0, wT;
window.addEventListener('wheel', e => {
  e.preventDefault();
  wAcc += e.deltaY;
  clearTimeout(wT);
  wT = setTimeout(() => wAcc = 0, 300);
  if (Math.abs(wAcc) > 55) { go(wAcc > 0 ? cur+1 : cur-1); wAcc = 0; }
}, { passive: false });

let ty0 = null;
window.addEventListener('touchstart', e => ty0 = e.touches[0].clientY, {passive:true});
window.addEventListener('touchend', e => {
  if (ty0 === null) return;
  const dy = ty0 - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 50) go(dy > 0 ? cur+1 : cur-1);
  ty0 = null;
}, {passive:true});

window.addEventListener('keydown', e => {
  if (e.key==='ArrowDown'||e.key==='ArrowRight') go(cur+1);
  if (e.key==='ArrowUp'  ||e.key==='ArrowLeft')  go(cur-1);
});

document.getElementById('nb-next').addEventListener('click', () => go(cur+1));
document.getElementById('nb-prev').addEventListener('click', () => go(cur-1));

const curs = document.getElementById('curs');
let mx = innerWidth/2, my = innerHeight/2, cx = mx, cy = my;
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function tick() {
  cx += (mx-cx) * .13;
  cy += (my-cy) * .13;
  curs.style.left = cx + 'px';
  curs.style.top  = cy + 'px';
  requestAnimationFrame(tick);
})();

let auto = setInterval(() => go(cur+1), 5500);
const stopAuto = () => clearInterval(auto);
window.addEventListener('wheel',      stopAuto, {once:true});
window.addEventListener('touchstart', stopAuto, {once:true});
window.addEventListener('keydown',    stopAuto, {once:true});
document.querySelectorAll('.nav-btn,.dot').forEach(b =>
  b.addEventListener('click', stopAuto, {once:true})
);
</script>
</body>
</html>
