<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<link rel="stylesheet" href="shop.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="checkout-wrapper">

<div class="checkout-form">

<h2>Shipping Details</h2>

<form action="order.html">

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="Address" required>

<input type="text" placeholder="City" required>

<input type="text" placeholder="Phone Number" required>


<h3>Payment Method</h3>

<select id="payment" onchange="paymentChange()" required>

<option value="">Select Payment Method</option>
<option value="upi">UPI</option>
<option value="card">Credit Card</option>
<option value="card">Debit Card</option>
<option value="cod">Cash on Delivery</option>

</select>


<div id="upi-section" style="display:none">

<input type="text" placeholder="Enter UPI ID (example@upi)">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi-payment" class="upi-qr">

<p>Scan QR to Pay</p>

</div>

<button type="submit">Place Order</button>

</form>

</div>

</div>


<script>

function paymentChange(){

let payment = document.getElementById("payment").value;
let upi = document.getElementById("upi-section");

if(payment === "upi"){

upi.style.display="block";

}else{

upi.style.display="none";

}

}

</script>

<script>

function processPayment(){

document.getElementById("payment-loader").style.display="block";

setTimeout(function(){

window.location.href="order.html";

},2000);

}

</script>

</body>

</html>
